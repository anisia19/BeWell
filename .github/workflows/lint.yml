name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        run: |
          echo "FILES=$(git diff --name-only origin/${{ github.base_ref || 'main' }} -- 'apps/api/**/*.js' 'apps/api/**/*.jsx' 'apps/api/**/*.ts' 'apps/api/**/*.tsx' | sed 's|apps/api/||g' | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Run ESLint (changed files only)
        run: |
          if [ -z "$FILES" ]; then
            echo "No JS/TS files changed"
          else
            npx eslint $FILES --max-warnings=0
          fi

      - name: Check Prettier formatting
        run: npx prettier --check .

      - name: TypeScript type check
        run: npx tsc --noEmit
